controller_manager:
    ros__parameters:
        use_sim_time: true

        update_rate: 1000

        effort_controller:
            type: effort_controllers/JointGroupEffortController
            
        joint_state_broadcaster:
            type: joint_state_broadcaster/JointStateBroadcaster

        imu_sensor_broadcaster:
            type: imu_sensor_broadcaster/IMUSensorBroadcaster

        whole_body_controller:
            type: hqp_controller/HQPController

        static_walk_planner:
            type: static_walk_planner/SWPController

        lip_planner:
            type: lip_walking_trot_planner/LIPController

        pronto_estimator:
            type: pronto_controller/Pronto_Controller

joint_state_broadcaster:
    ros__parameters:
        joints:
            - LF_HAA
            - LF_HFE
            - LF_KFE
            - RF_HAA
            - RF_HFE
            - RF_KFE
            - LH_HAA
            - LH_HFE
            - LH_KFE
            - RH_HAA
            - RH_HFE
            - RH_KFE
        interfaces:
            - position
            - velocity
            - effort


imu_sensor_broadcaster:
    ros__parameters:
        sensor_name: imu_sensor
        frame_id: base


whole_body_controller:
    ros__parameters:
        use_sim_time: true

        robot_name: solo12
        sample_time: 0.0001

        use_estimator: false        # ! Must be the same as the use_estimator in the planner
        initialization_time: 1.5

        q1:
            -  0.0
            -  0.3
            - -0.6
            -  0.0
            -  0.3
            - -0.6
            -  0.0
            - -0.3
            -  0.6
            -  0.0
            - -0.3
            -  0.6

        PD_proportional: 5.
        PD_derivative: 0.05

        logging: true

        joints:
            - LF_HAA
            - LF_HFE
            - LF_KFE
            - RF_HAA
            - RF_HFE
            - RF_KFE
            - LH_HAA
            - LH_HFE
            - LH_KFE
            - RH_HAA
            - RH_HFE
            - RH_KFE

        contact_constraint_type: soft_sim

        shift_base_height: false
        
        tau_max: 2.7
        mu: 0.6
        Fn_max: 15.
        Fn_min: 2.

        kp_b_pos:
            - 100.
            - 100.
            - 100.
        kd_b_pos:
            - 10.
            - 10.
            - 10.

        kp_b_ang:
            - 150.
            - 150.
            - 150.
        kd_b_ang:
            - 35.
            - 35.
            - 35.

        kp_s_pos:
            - 900.
            - 900.
            - 900.
        kd_s_pos:
            - 30.
            - 30.
            - 30.
            
        kp_terr:
            - 1000.
            - 1000.
            - 1000.
        kd_terr:
            - 1000.
            - 1000.
            - 1000.

        kc_v:
            - 0.
            - 0.
            - 0.

        regularization: 1e-6


static_walk_planner:
    ros__parameters:
        use_sim_time: true

        use_estimator: false        # ! Must be the same as the use_estimator in the whole_body_controller
        initialization_time: 1.

        sample_time: 0.005
        init_phase: 0.4

        gait_pattern:
            - LF
            - RH
            - RF
            - LH

        cycle_duration: 3.0
        step_duty_factor: 0.7

        step_length: 0.15
        step_height: 0.075
        desired_foot_penetration: 0.01
        step_horizontal_delay: 0.1
        foot_trajectory_type: splines

        desired_base_height: 0.26
        initial_base_height: 0.31

        terrain_height: 0.0
        terrain_penetration: 0.0

        initial_position:
            - 0.
            - 0.
        leg_position: 
            - 0.165
            - 0.11
        base_oscillation: 
            - 0.04
            - 0.03


lip_planner:
    ros__parameters:
        use_sim_time: true

        zero_time: 0.5
        init_time: 0.25

        sample_time: 0.001

        step_reachability: 0.15
        feet_theta: 0.6
        feet_r: 0.2
        base_height: 0.26

        max_fixed_steps: 6

        interpolation_method: spline3   # must be in [spline3, spline5, cycloid]
        step_duration: 0.2
        step_height: 0.05
        step_horizontal_phase_delay: 0.0
        foot_penetration: -0.025

        acc_filter_order: 2
        acc_filter_beta: 0.9

        correct_with_terrain_penetrations: true
        gain_correction_with_terrain_penetrations: 0.5

        interpolate_swing_feet_from_current_position: false
pronto_estimator :
  ros__parameters:
    urdf_path: "/home/jacopo/Documents/control_quadrupeds_soft_contacts/src/pronto_solo12/config/solo12_model.urdf"
    use_sim_time: True
    pose_topic : "pose"
    pose_frame_id : "odom"
    twist_topic : "twist"
    twist_frame_id : "base"
    filter_state_topic : "filter_state"
    publish_filter_state : true
    publish_pose : true
    publish_tf : true
    tf_child_frame_id : "base_pronto"
    republish_sensors : false
    init_sensors : [ins, pose_meas] 
    active_sensors : [ins, legodo, bias_lock]
    utime_history_span : 60000
    joints:
        - LF_HAA
        - LF_HFE
        - LF_KFE
        - RF_HAA
        - RF_HFE
        - RF_KFE
        - LH_HAA
        - LH_HFE
        - LH_KFE
        - RH_HAA
        - RH_HFE
        - RH_KFE

    sigma0 :
      vb : 0.5 # m/s
      chi_xy : 3.0 # degrees?
      chi_z : 3.0 # degrees?
      Delta_xy : 0.05 #0.5 # m
      Delta_z : 0.05 # 1   # m
      gyro_bias : 0.0 # deg/s
      accel_bias : 0.0 # m/s^2 # 0.1 worked during tuning

    x0 :
      velocity : [ 0.0, 0.0, 0.0 ]
      angular_velocity : [ 0.0, 0.0, 0.0 ]
      position : [ 0.0, 0.0, 0.0 ]
      rpy : [ 0.0, 0.0, 0.0 ]

    init_message :
      channel : "filter_initializer"

    ins :
      topic : "/imu_plugin"
      utime_offset : 0 # units 1e-6 seconds
      downsample_factor : 1 # process 1 out of every this many. for 333Hz use 1. for 1kHz use 3
      roll_forward_on_receive : true
      publish_head_on_message : true
      
      # don't integrate acceleration, rely on some other source for velocity/position
      ignore_accel : false

      # not clear what value to set for the omega, if it is rad/s it seems too much
      q_gyro : 0.01 # deg / s
      q_accel : 0.5 # m / s^2, taken from any_common/any_description/urdf/sensors/imu/xsens_mti/xsens_mti.urdf.xacro
      q_gyro_bias : 0.0 # deg / sec^2 | 0.001 suggested by charlie, but not deemed to be necessary
      q_accel_bias : 0.0 # m / sec^2 / sec | 0.001 suggested by charlie and worked well on logs

      # number of samples for the bias estimation
      num_to_init : 1000 
      
      accel_bias_initial : [0.0, 0.0, 0.0] 
      accel_bias_recalc_at_start : true
      accel_bias_update_online : false

      gyro_bias_initial : [0.0, 0.0, 0.0] # rad/s
      gyro_bias_recalc_at_start : true
      gyro_bias_update_online : false
    
      frame : "imu_link"

      # REMEMBER TO CHANGE THIS IF YOU CHANGE THE IMU FREQUENCY or downsample factor
      timestep_dt : 0.0025 # 

      # attempt to detect drastically incorrect initial gyro biases estimates:
      max_initial_gyro_bias : 0.015 # deg/sec, biases above this will be set to zero

    legodo :
      topic : "/joint_states"
      # ground_truth_channel : "POSE_GROUND_TRUTH"

      time_offset : 0.0 # time offset between vicon and other messages (useful for logs)
      verbose : false # Prints warnings and messages 
      debug : false # Sends signals and saves text files with signals

      legodo_mode : 3 # STATIC_SIGMA 0x00, VAR_SIGMA 0x01, IMPACT_SIGMA 0x02, WEIGHTED_AVG 0x04, ALPHA_FILTER : 0x08, KALMAN_FILTER : 0x10
      
      stance_mode : 1 # 0 : THRESHOLD, 1 : HYSTERESIS, 2 : REGRESSION
      stance_threshold : 3.5 # threshold of GRF[z] to trigger the stance phase
      
      stance_hysteresis_low : 5.0 # hysteresis low threshold
      stance_hysteresis_high : 6.0 # hysteresis high threshold
      stance_hysteresis_delay_low : 0 # delay low for schmitt trigger in milliseconds
      stance_hysteresis_delay_high : 30 # 35 # delay in for schmitt trigger in milliseconds

      stance_alpha : 0.02 # alpha for the alpha filter
      
      stance_regression_beta_size : 8 # 2 (same value for all legs), 8 
      # logistic regression parameters: beta0 beta1
      stance_regression_beta : [3.7252,-0.018077,2.8191,-0.015947,3.2241,-0.018661,3.8836,-0.019669]    
      r_vx : 0.05 # sigma velocity x
      r_vy : 0.05 # sigma velocity y
      r_vz : 0.15 # sigma velocity z
      
      # true only if you have stance ground truth from simulation
      # im_stance_gt : false 
      
      downsample_factor : 1
      utime_offset : 0 # don't confuse with time_offset

      roll_forward_on_receive : true
      publish_head_on_message : false